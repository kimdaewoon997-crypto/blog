  <style>
    /* ─────────────────────────────────────────
       DESIGN TOKEN
    ───────────────────────────────────────── */
    :root {
      --navy:      #1a2e5a;
      --navy-dark: #111f3e;
      --gold:      #c8a951;
      --gold-lt:   #f0dfa0;
      --bg:        #f5f6f8;
      --surface:   #ffffff;
      --border:    #e2e6ed;
      --text:      #202124;
      --muted:     #6b7280;
      --accent:    #2563eb;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
      --transition: .18s ease;
    }

    /* ─────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      background: var(--bg);
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    ul { padding-left: 1.4em; }
    li { margin-bottom: .3em; }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    #site-header {
      background: var(--navy);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .header-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .site-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -.5px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
    }
    .logo-text { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .logo-text small { display: block; font-size: 10px; font-weight: 400; opacity: .75; }

    /* mobile menu toggle */
    .menu-toggle {
      display: none;
      background: none; border: none;
      color: #fff; font-size: 22px; cursor: pointer;
      padding: 4px 8px;
    }

    /* desktop search bar */
    .header-search {
      flex: 1; max-width: 360px;
      display: flex;
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 24px;
      overflow: hidden;
    }
    .header-search input {
      flex: 1; padding: 6px 14px;
      background: rgba(255,255,255,.1);
      border: none; outline: none;
      color: #fff; font-size: 13px;
      font-family: inherit;
    }
    .header-search input::placeholder { color: rgba(255,255,255,.5); }
    .header-search button {
      padding: 0 14px;
      background: var(--gold); border: none; cursor: pointer;
      color: var(--navy); font-size: 14px; font-weight: 700;
    }

    .header-tel {
      display: flex; align-items: center; gap: 6px;
      background: var(--gold); color: var(--navy);
      font-size: 13px; font-weight: 700;
      padding: 6px 14px; border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .header-tel:hover { opacity: .9; }

    /* ─────────────────────────────────────────
       LAYOUT
    ───────────────────────────────────────── */
    #app-wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 80px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    /* ─────────────────────────────────────────
       SIDEBAR
    ───────────────────────────────────────── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      position: sticky;
      top: 78px;
    }
    .sidebar-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 20px 16px;
      margin-bottom: 16px;
    }

    /* profile */
    .profile-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--navy), #2563eb);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
      margin: 0 auto 10px;
    }
    .profile-name {
      text-align: center;
      font-weight: 700; font-size: 14px;
      color: var(--navy);
    }
    .profile-sub {
      text-align: center;
      font-size: 11px; color: var(--muted);
      margin-top: 2px; line-height: 1.5;
    }
    .profile-badges {
      display: flex; flex-wrap: wrap; gap: 4px;
      justify-content: center; margin-top: 10px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 500;
    }

    /* category nav */
    .sidebar-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .cat-nav { list-style: none; padding: 0; }
    .cat-nav li { margin-bottom: 2px; }
    .cat-nav a {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 13px;
      color: var(--text);
      transition: background var(--transition);
      cursor: pointer;
    }
    .cat-nav a:hover  { background: #f0f4ff; color: var(--navy); }
    .cat-nav a.active { background: var(--navy); color: #fff; font-weight: 700; }
    .cat-count {
      font-size: 11px;
      background: rgba(0,0,0,.08);
      padding: 1px 6px; border-radius: 8px;
    }
    .cat-nav a.active .cat-count { background: rgba(255,255,255,.2); }

    /* sidebar contact */
    .sidebar-contact a {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 7px;
      font-size: 13px; font-weight: 500;
      color: var(--navy);
      background: #f0f4ff;
      margin-bottom: 6px;
      transition: background var(--transition);
    }
    .sidebar-contact a:hover { background: #dde5ff; }

    /* ─────────────────────────────────────────
       MAIN CONTENT
    ───────────────────────────────────────── */
    #main {
      flex: 1;
      min-width: 0;
    }

    /* ─────────────────────────────────────────
       VIEW: LIST
    ───────────────────────────────────────── */
    #view-list { display: block; }
    #view-post { display: none; }

    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .list-title {
      font-size: 18px; font-weight: 700; color: var(--navy);
    }
    .list-count { font-size: 13px; color: var(--muted); }

    /* post card */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      margin-bottom: 14px;
      display: flex; gap: 16px;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.12);
    }
    .post-thumb {
      width: 100px; height: 72px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--navy) 0%, #2563eb 100%);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,.4); font-size: 28px;
      overflow: hidden;
    }
    .post-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .post-info { flex: 1; min-width: 0; }
    .post-cat-tag {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
      background: #eef2ff; color: #3730a3;
      margin-bottom: 5px;
    }
    .post-card-title {
      font-size: 15px; font-weight: 700;
      color: var(--text); line-height: 1.4;
      margin-bottom: 6px;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .post-summary {
      font-size: 13px; color: var(--muted);
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      line-height: 1.55;
    }
    .post-meta {
      margin-top: 8px;
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; color: #9ca3af;
    }
    .tag-chip {
      padding: 1px 7px; border-radius: 10px;
      background: #f3f4f6; color: #6b7280;
      font-size: 10px;
    }

    /* empty state */
    .empty-state {
      text-align: center; padding: 60px 0;
      color: var(--muted); font-size: 14px;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }

    /* ─────────────────────────────────────────
       VIEW: POST DETAIL
    ───────────────────────────────────────── */
    .post-detail-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 36px;
    }
    .post-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
      margin-bottom: 20px; cursor: pointer;
      transition: color var(--transition);
    }
    .post-back:hover { color: var(--navy); }
    .post-detail-cat {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 12px;
      background: var(--navy); color: #fff;
      margin-bottom: 10px;
    }
    .post-detail-title {
      font-size: 22px; font-weight: 700;
      color: var(--navy); line-height: 1.4;
      margin-bottom: 10px;
    }
    .post-detail-meta {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 28px;
    }
    .tag-list { display: flex; flex-wrap: wrap; gap: 5px; }

    /* ─────────────────────────────────────────
       POST BODY CONTENT STYLES
    ───────────────────────────────────────── */
    .post-body h2 {
      font-size: 19px; font-weight: 700;
      color: var(--navy);
      margin: 36px 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--gold);
    }
    .post-body h3 {
      font-size: 16px; font-weight: 700;
      color: var(--navy-dark);
      margin: 24px 0 8px;
    }
    .post-body p { margin-bottom: 14px; }
    .post-body ul { margin-bottom: 14px; }
    .post-body li { margin-bottom: 5px; }
    .post-body strong { color: var(--navy); }
    .post-body em { font-style: normal; color: #b45309; font-weight: 500; }

    /* intro box */
    .intro-box {
      background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
      border-left: 4px solid var(--navy);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 18px 20px;
      margin-bottom: 28px;
      font-size: 15px; line-height: 1.75;
    }

    /* standard / info box */
    .standard-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin: 20px 0;
    }
    .standard-box h3 {
      color: var(--navy);
      border-left: 3px solid var(--gold);
      padding-left: 10px;
      margin-top: 18px;
    }
    .standard-box h3:first-child { margin-top: 0; }

    /* step box */
    .step-box { margin: 20px 0; display: flex; flex-direction: column; gap: 12px; }
    .step {
      display: flex; align-items: flex-start; gap: 14px;
      background: #f0f4ff;
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .step-num {
      background: var(--navy); color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
      margin-top: 2px;
    }
    .step-content strong { display: block; margin-bottom: 4px; font-size: 14px; color: var(--navy); }
    .step-content p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* timeline */
    .timeline-box { position: relative; padding-left: 28px; margin: 20px 0; }
    .timeline-box::before {
      content: ''; position: absolute;
      left: 9px; top: 8px; bottom: 8px;
      width: 2px; background: var(--border);
    }
    .tl-item { position: relative; margin-bottom: 16px; }
    .tl-item::before {
      content: '';
      position: absolute; left: -23px; top: 5px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 2px var(--gold);
    }
    .tl-date {
      display: inline-block;
      font-size: 11px; font-weight: 700;
      color: var(--navy);
      background: var(--gold-lt);
      padding: 1px 8px; border-radius: 10px;
      margin-bottom: 3px;
    }
    .tl-item p { font-size: 13px; color: var(--muted); margin: 0; }

    /* FAQ */
    .faq-box { margin: 20px 0; }
    .faq-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 8px;
    }
    .faq-q {
      background: #f8fafc;
      padding: 12px 16px;
      font-size: 14px; font-weight: 700;
      color: var(--navy); margin: 0;
    }
    .faq-a {
      padding: 12px 16px;
      font-size: 13px; color: var(--muted);
      margin: 0; line-height: 1.65;
    }

    /* CTA box */
    .cta-box {
      background: linear-gradient(135deg, var(--navy) 0%, #1e3a8a 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      margin: 36px 0 0;
    }
    .cta-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .cta-box p { font-size: 12px; opacity: .7; margin-bottom: 18px; }
    .cta-btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 14px; font-weight: 700;
      background: var(--gold);
      color: var(--navy);
      margin: 4px 6px;
      transition: opacity var(--transition);
    }
    .cta-btn:hover { opacity: .88; }
    .cta-btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,.5);
      color: #fff;
    }

    /* ─────────────────────────────────────────
       SEARCH RESULTS BAR
    ───────────────────────────────────────── */
    .search-bar-notice {
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px; color: #92400e;
      display: flex; align-items: center; gap: 8px;
    }
    .search-clear {
      margin-left: auto; cursor: pointer;
      font-size: 12px; color: #b45309; font-weight: 600;
    }

    /* ─────────────────────────────────────────
       MOBILE FLOATING CTA
    ───────────────────────────────────────── */
    #float-cta {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 300;
      background: var(--navy);
      padding: 10px 16px;
      box-shadow: 0 -3px 12px rgba(0,0,0,.2);
    }
    #float-cta a {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--gold);
      color: var(--navy);
      font-size: 15px; font-weight: 700;
      border-radius: 10px;
      padding: 12px;
    }

    /* ─────────────────────────────────────────
       MOBILE SIDEBAR OVERLAY
    ───────────────────────────────────────── */
    #sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 180;
    }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .header-search { display: none; }
      .header-tel span { display: none; }
      .header-tel { padding: 6px 10px; font-size: 16px; }
      .menu-toggle { display: block; }

      #sidebar {
        position: fixed;
        top: 0; left: -260px;
        width: 260px; height: 100dvh;
        overflow-y: auto;
        background: var(--bg);
        z-index: 190;
        padding: 70px 12px 100px;
        transition: left .25s ease;
        border-right: 1px solid var(--border);
      }
      #sidebar.open { left: 0; }
      #sidebar-overlay.open { display: block; }

      #app-wrap { padding: 16px 12px 100px; }

      .post-detail-wrap { padding: 20px 16px; }
      .post-detail-title { font-size: 18px; }
      .post-card { flex-direction: column; gap: 10px; }
      .post-thumb { width: 100%; height: 160px; }

      #float-cta { display: block; }
    }

    @media (max-width: 480px) {
      .post-detail-wrap { padding: 16px 12px; }
      .post-body h2 { font-size: 17px; }
    }
  </style>
</head>

  </aside>

  <!-- ── MAIN ── -->
  <main id="main">

    <!-- LIST VIEW -->
    <div id="view-list">
      <div class="list-header">
        <h1 class="list-title" id="list-title">전체 글</h1>
        <span class="list-count" id="list-count"></span>
      </div>
      <div id="search-notice" style="display:none"></div>
      <div id="post-list"></div>
    </div>

    <!-- POST DETAIL VIEW -->
    <div id="view-post">
      <div class="post-detail-wrap">
        <span class="post-back" onclick="goBack()">← 목록으로</span>
        <div id="post-detail-content"></div>
      </div>
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════════════
     MOBILE FLOATING CTA
═══════════════════════════════════════════ -->
<div id="float-cta">
  <a href="tel:010-3538-3098">📞 010-3538-3098 전화 상담</a>
</div>

<!-- ═══════════════════════════════════════════
     SCRIPTS
═══════════════════════════════════════════ -->
<script src="posts.js"></script>
<script>
/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let state = {
  view: 'list',      // 'list' | 'post'
  category: 0,       // 0 = all
  postId: null,
  search: '',
  history: [],       // for back navigation
};

/* ─────────────────────────────────────────────
   INIT — URL PARAMETER ROUTING
───────────────────────────────────────────── */
function init() {
  buildCatNav();

  const params = new URLSearchParams(window.location.search);
  const catParam  = params.get('category');
  const postParam = params.get('post');

  if (postParam) {
    const id = parseInt(postParam, 10);
    openPost(id, false);
  } else if (catParam) {
    selectCategory(parseInt(catParam, 10), false);
  } else {
    renderList();
  }

  // keyboard search
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
}

/* ─────────────────────────────────────────────
   CATEGORY NAV
───────────────────────────────────────────── */
function buildCatNav() {
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const count = cat.id === 0
      ? POSTS.length
      : POSTS.filter(p => p.category === cat.id).length;

    const li  = document.createElement('li');
    const a   = document.createElement('a');
    a.dataset.catId = cat.id;
    a.innerHTML = `${cat.label} <span class="cat-count">${count}</span>`;
    a.onclick = () => { selectCategory(cat.id); closeSidebar(); };
    li.appendChild(a);
    nav.appendChild(li);
  });

  updateActiveCat();
}

function updateActiveCat() {
  document.querySelectorAll('.cat-nav a').forEach(a => {
    a.classList.toggle('active', parseInt(a.dataset.catId) === state.category);
  });
}

/* ─────────────────────────────────────────────
   SELECT CATEGORY
───────────────────────────────────────────── */
function selectCategory(catId, pushHistory = true) {
  if (pushHistory && state.view !== 'list') state.history.push({...state});
  state.category = catId;
  state.search   = '';
  state.view     = 'list';
  state.postId   = null;
  document.getElementById('search-input').value = '';
  updateURL();
  renderList();
  updateActiveCat();
}

/* ─────────────────────────────────────────────
   RENDER LIST
───────────────────────────────────────────── */
function renderList() {
  showView('list');

  let filtered = state.category === 0
    ? [...POSTS]
    : POSTS.filter(p => p.category === state.category);

  if (state.search) {
    const q = state.search.toLowerCase();
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.summary.toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  const catLabel = CATEGORIES.find(c => c.id === state.category)?.label || '전체 글';
  document.getElementById('list-title').textContent =
    state.search ? `"${state.search}" 검색 결과` : catLabel;
  document.getElementById('list-count').textContent = `총 ${filtered.length}건`;

  // search notice
  const noticeEl = document.getElementById('search-notice');
  if (state.search) {
    noticeEl.style.display = 'block';
    noticeEl.innerHTML = `
      <div class="search-bar-notice">
        🔍 <strong>"${state.search}"</strong> 검색 결과입니다.
        <span class="search-clear" onclick="clearSearch()">✕ 검색 취소</span>
      </div>`;
  } else {
    noticeEl.style.display = 'none';
  }

  // update page meta for list
  updateMeta(catLabel + ' | 지엘행정사사무소 블로그',
    `지엘행정사사무소의 ${catLabel} 관련 실무 정보 모음입니다.`);

  const listEl = document.getElementById('post-list');
  if (filtered.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>아직 등록된 글이 없습니다.</p>
      </div>`;
    return;
  }

  listEl.innerHTML = filtered.map(post => {
    const catLabel = CATEGORIES.find(c => c.id === post.category)?.label || '';
    const tagsHtml = (post.tags || []).slice(0, 3)
      .map(t => `<span class="tag-chip">#${t}</span>`).join('');
    const thumbHtml = post.thumbnail
      ? `<img src="${post.thumbnail}" alt="${escHtml(post.title)}" />`
      : '📄';

    return `
      <div class="post-card" onclick="openPost(${post.id})">
        <div class="post-thumb">${thumbHtml}</div>
        <div class="post-info">
          <span class="post-cat-tag">${escHtml(catLabel)}</span>
          <p class="post-card-title">${escHtml(post.title)}</p>
          <p class="post-summary">${escHtml(post.summary)}</p>
          <div class="post-meta">
            <span>${post.date}</span>
            <div class="tag-list">${tagsHtml}</div>
          </div>
        </div>
      </div>`;
  }).join('');
}

/* ─────────────────────────────────────────────
   OPEN POST
───────────────────────────────────────────── */
function openPost(postId, pushHistory = true) {
  const post = POSTS.find(p => p.id === postId);
  if (!post) { renderList(); return; }

  if (pushHistory) state.history.push({...state});
  state.view   = 'post';
  state.postId = postId;
  updateURL();
  showView('post');

  const catLabel = CATEGORIES.find(c => c.id === post.category)?.label || '';
  const tagsHtml = (post.tags || [])
    .map(t => `<span class="tag-chip">#${t}</span>`).join('');

  document.getElementById('post-detail-content').innerHTML = `
    <span class="post-detail-cat">${escHtml(catLabel)}</span>
    <h1 class="post-detail-title">${escHtml(post.title)}</h1>
    <div class="post-detail-meta">
      <span>📅 ${post.date}</span>
      <span>✍️ 김대운 행정사</span>
      <div class="tag-list">${tagsHtml}</div>
    </div>
    ${post.body}
  `;

  // dynamic SEO meta
  updateMeta(post.title + ' | 지엘행정사사무소', post.summary);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─────────────────────────────────────────────
   NAVIGATION HELPERS
───────────────────────────────────────────── */
function goBack() {
  if (state.history.length > 0) {
    const prev = state.history.pop();
    Object.assign(state, prev);
  } else {
    state.view     = 'list';
    state.postId   = null;
  }
  updateURL();
  if (state.view === 'post') {
    openPost(state.postId, false);
  } else {
    renderList();
  }
}

function goHome() {
  state = { view: 'list', category: 0, postId: null, search: '', history: [] };
  document.getElementById('search-input').value = '';
  updateURL();
  renderList();
  updateActiveCat();
}

/* ─────────────────────────────────────────────
   SEARCH
───────────────────────────────────────────── */
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  state.search   = q;
  state.category = 0;
  state.view     = 'list';
  state.postId   = null;
  updateActiveCat();
  renderList();
}

function clearSearch() {
  state.search = '';
  document.getElementById('search-input').value = '';
  renderList();
}

/* ─────────────────────────────────────────────
   VIEW SWITCH
───────────────────────────────────────────── */
function showView(which) {
  document.getElementById('view-list').style.display = which === 'list' ? 'block' : 'none';
  document.getElementById('view-post').style.display = which === 'post'  ? 'block' : 'none';
}

/* ─────────────────────────────────────────────
   DYNAMIC SEO META
───────────────────────────────────────────── */
function updateMeta(title, desc) {
  document.title = title;
  document.getElementById('meta-desc').setAttribute('content', desc);
  document.getElementById('og-title').setAttribute('content', title);
  document.getElementById('og-desc').setAttribute('content', desc);
}

/* ─────────────────────────────────────────────
   URL SYNC
───────────────────────────────────────────── */
function updateURL() {
  const params = new URLSearchParams();
  if (state.view === 'post' && state.postId) {
    params.set('post', state.postId);
  } else if (state.category !== 0) {
    params.set('category', state.category);
  }
  const newUrl = params.toString()
    ? `${location.pathname}?${params.toString()}`
    : location.pathname;
  history.pushState(null, '', newUrl);
}

window.addEventListener('popstate', () => {
  const params = new URLSearchParams(window.location.search);
  const catParam  = params.get('category');
  const postParam = params.get('post');
  if (postParam) {
    openPost(parseInt(postParam, 10), false);
  } else if (catParam) {
    selectCategory(parseInt(catParam, 10), false);
  } else {
    state = { view: 'list', category: 0, postId: null, search: '', history: [] };
    renderList();
    updateActiveCat();
  }
});

/* ─────────────────────────────────────────────
   MOBILE SIDEBAR
───────────────────────────────────────────── */
document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
});
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

/* ─────────────────────────────────────────────
   UTIL
───────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────────────────────────
   START
───────────────────────────────────────────── */
init();
</script>
</body>
</html>
